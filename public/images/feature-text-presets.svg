<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="tpHeader" x1="0" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" rx="12" fill="#1e1e1e"/>
  <rect width="480" height="320" rx="12" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Header -->
  <rect width="480" height="36" rx="12" fill="#252525"/>
  <rect y="24" width="480" height="12" fill="#252525"/>
  <rect width="480" height="2" fill="url(#tpHeader)"/>
  <text x="16" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e0e0e0">Dony's Library</text>
  <text x="130" y="24" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666">— Text Presets</text>

  <!-- Tab bar -->
  <rect y="36" width="480" height="28" fill="#222"/>
  <text x="50" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Gradient</text>
  <rect x="85" y="42" width="55" height="18" rx="4" fill="#6366f1" opacity="0.2"/>
  <text x="112" y="55" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#a5b4fc" text-anchor="middle">Text</text>
  <text x="175" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">Assets</text>

  <!-- Category pills -->
  <rect x="12" y="72" width="42" height="16" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="33" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#a5b4fc" text-anchor="middle">Slide</text>
  <text x="73" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Scale</text>
  <text x="112" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Rotate</text>
  <text x="148" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Fade</text>
  <text x="192" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Tracking</text>
  <text x="244" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Compound</text>
  <text x="296" y="83" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Stylistic</text>

  <!-- Preset cards -->
  <!-- Slide Up -->
  <g>
    <rect x="12" y="96" width="110" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="22" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Up</text>
    <text x="22" y="130" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Position Y · 0.5s</text>
    <!-- Arrow icon -->
    <text x="108" y="120" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6366f1" text-anchor="end">↑</text>
    <!-- In/Out badge -->
    <rect x="22" y="136" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="32" y="145" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Slide Down -->
  <g>
    <rect x="130" y="96" width="110" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="140" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Down</text>
    <text x="140" y="130" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Position Y · 0.5s</text>
    <text x="226" y="120" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6366f1" text-anchor="end">↓</text>
    <rect x="140" y="136" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="150" y="145" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Slide Left (selected/active) -->
  <g>
    <rect x="248" y="96" width="110" height="56" rx="6" fill="#333" stroke="#6366f1" stroke-width="1"/>
    <text x="258" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#a5b4fc">Slide Left</text>
    <text x="258" y="130" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#818cf8">Position X · 0.5s</text>
    <text x="344" y="120" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a5b4fc" text-anchor="end">←</text>
    <rect x="258" y="136" width="28" height="12" rx="3" fill="#6366f1" opacity="0.25"/>
    <text x="272" y="145" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In+Out</text>
  </g>

  <!-- Slide Right -->
  <g>
    <rect x="366" y="96" width="102" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="376" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Right</text>
    <text x="376" y="130" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Position X · 0.5s</text>
    <text x="454" y="120" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#6366f1" text-anchor="end">→</text>
    <rect x="376" y="136" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="386" y="145" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Slide Up Fade -->
  <g>
    <rect x="12" y="160" width="110" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="22" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Up Fade</text>
    <text x="22" y="194" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Pos Y + Opacity · 0.6s</text>
    <rect x="22" y="200" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="32" y="209" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Slide Down Fade -->
  <g>
    <rect x="130" y="160" width="110" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="140" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Down Fade</text>
    <text x="140" y="194" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Pos Y + Opacity · 0.6s</text>
    <rect x="140" y="200" width="28" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="154" y="209" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">Out</text>
  </g>

  <!-- Slide Left Fade -->
  <g>
    <rect x="248" y="160" width="110" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="258" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Left Fade</text>
    <text x="258" y="194" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Pos X + Opacity · 0.6s</text>
    <rect x="258" y="200" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="268" y="209" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Slide Right Fade -->
  <g>
    <rect x="366" y="160" width="102" height="56" rx="6" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
    <text x="376" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#e0e0e0">Slide Right Fade</text>
    <text x="376" y="194" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">Pos X + Opacity · 0.6s</text>
    <rect x="376" y="200" width="20" height="12" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="386" y="209" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a5b4fc" text-anchor="middle">In</text>
  </g>

  <!-- Duration control bar -->
  <rect y="230" width="480" height="1" fill="#333"/>

  <!-- Settings area -->
  <text x="16" y="252" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e0e0e0">Settings</text>

  <text x="16" y="274" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#999">Duration</text>
  <rect x="80" y="263" width="120" height="18" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Slider track -->
  <rect x="86" y="270" width="108" height="4" rx="2" fill="#333"/>
  <rect x="86" y="270" width="40" height="4" rx="2" fill="#6366f1"/>
  <circle cx="126" cy="272" r="5" fill="#6366f1" stroke="#fff" stroke-width="1"/>
  <text x="210" y="277" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a5b4fc">0.5s</text>

  <text x="16" y="298" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#999">Easing</text>
  <rect x="80" y="287" width="70" height="18" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="115" y="300" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Overshoot</text>
  <rect x="155" y="287" width="55" height="18" rx="4" fill="#2a2a2a"/>
  <text x="182" y="300" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#666" text-anchor="middle">Bounce</text>
  <rect x="215" y="287" width="55" height="18" rx="4" fill="#2a2a2a"/>
  <text x="242" y="300" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#666" text-anchor="middle">Elastic</text>

  <!-- Apply button -->
  <rect x="370" y="286" width="96" height="26" rx="5" fill="#4f46e5"/>
  <text x="418" y="303" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Apply</text>
</svg>