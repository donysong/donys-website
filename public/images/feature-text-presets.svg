<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">

  <!-- Background -->
  <rect width="480" height="320" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>

  <!-- Cream top stripe -->
  <line x1="0" y1="0" x2="480" y2="0" stroke="#d4ccc0" stroke-width="1" opacity="0.3"/>

  <!-- Header (height=32) -->
  <rect x="0" y="0" width="480" height="32" fill="#141414"/>
  <rect x="14" y="11" width="8" height="8" fill="none" stroke="#d4ccc0" stroke-width="1" transform="rotate(45 18 15)"/>
  <text x="17" y="19" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#d4ccc0" text-anchor="middle">D</text>
  <text x="30" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e8e0d4" letter-spacing="2">DONY&apos;S LIBRARY</text>

  <!-- Tab bar (height=24) -->
  <rect x="0" y="32" width="480" height="24" fill="#141414"/>
  <line x1="0" y1="56" x2="480" y2="56" stroke="#2a2826" stroke-width="1"/>
  <text x="60" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8a8478" text-anchor="middle">GRADIENT</text>
  <text x="130" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e8e0d4" text-anchor="middle">TEXT</text>
  <line x1="112" y1="56" x2="148" y2="56" stroke="#d4ccc0" stroke-width="2"/>
  <text x="200" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8a8478" text-anchor="middle">ASSETS</text>

  <!-- Category pills (height=28) -->
  <rect x="0" y="56" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="84" x2="480" y2="84" stroke="#2a2826" stroke-width="1"/>
  <rect x="12" y="62" width="30" height="16" fill="#1a1a1a" stroke="#d4ccc0" stroke-width="1"/>
  <text x="27" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d4ccc0" text-anchor="middle">Slide</text>
  <rect x="48" y="62" width="34" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="65" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Scale</text>
  <rect x="88" y="62" width="34" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="105" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Rotate</text>
  <rect x="128" y="62" width="28" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="142" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Fade</text>
  <rect x="162" y="62" width="44" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="184" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Tracking</text>

  <!-- Row 1: Slide Up -->
  <rect x="0" y="84" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="112" x2="480" y2="112" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="102" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d4ccc0">&#8593;</text>
  <text x="36" y="100" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Slide Up</text>
  <text x="36" y="111" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Position Y · 0.5s</text>
  <rect x="376" y="91" width="20" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="386" y="101" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">IN</text>
  <rect x="400" y="91" width="22" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="411" y="101" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">OUT</text>
  <text x="452" y="102" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8a8478">&#8250;</text>

  <!-- Row 2: Bounce In (selected) -->
  <rect x="0" y="112" width="480" height="28" fill="#242424"/>
  <line x1="0" y1="140" x2="480" y2="140" stroke="#2a2826" stroke-width="1"/>
  <line x1="0" y1="112" x2="0" y2="140" stroke="#d4ccc0" stroke-width="2"/>
  <text x="18" y="130" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d4ccc0">&#8599;</text>
  <text x="36" y="128" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#e8e0d4">Bounce In</text>
  <text x="36" y="139" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d4ccc0">Scale · 0.6s</text>
  <rect x="376" y="119" width="20" height="14" fill="#1a1a1a" stroke="#d4ccc0" stroke-width="1"/>
  <text x="386" y="129" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#d4ccc0" text-anchor="middle">IN</text>
  <rect x="400" y="119" width="22" height="14" fill="#1a1a1a" stroke="#d4ccc0" stroke-width="1"/>
  <text x="411" y="129" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#d4ccc0" text-anchor="middle">OUT</text>
  <text x="452" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d4ccc0">&#8250;</text>

  <!-- Row 3: Fade Up -->
  <rect x="0" y="140" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="168" x2="480" y2="168" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="158" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d4ccc0">&#8593;</text>
  <text x="36" y="156" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Fade Up</text>
  <text x="36" y="167" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Opacity · 0.4s</text>
  <rect x="376" y="147" width="20" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="386" y="157" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">IN</text>
  <rect x="400" y="147" width="22" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="411" y="157" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">OUT</text>
  <text x="452" y="158" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8a8478">&#8250;</text>

  <!-- Row 4: Slide Left -->
  <rect x="0" y="168" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="196" x2="480" y2="196" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="186" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d4ccc0">&#8592;</text>
  <text x="36" y="184" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Slide Left</text>
  <text x="36" y="195" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Position X · 0.5s</text>
  <rect x="376" y="175" width="20" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="386" y="185" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">IN</text>
  <rect x="400" y="175" width="22" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="411" y="185" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">OUT</text>

  <!-- Row 5: Scale Up -->
  <rect x="0" y="196" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="224" x2="480" y2="224" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="214" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#d4ccc0">+</text>
  <text x="36" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Scale Up</text>
  <text x="36" y="223" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Scale · 0.5s</text>

  <!-- Row 6: Elastic Out -->
  <rect x="0" y="224" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="252" x2="480" y2="252" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="242" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#d4ccc0">~</text>
  <text x="36" y="240" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Elastic Out</text>
  <text x="36" y="251" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Scale + Rotation · 0.8s</text>

  <!-- Row 7: Tracking In -->
  <rect x="0" y="252" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="280" x2="480" y2="280" stroke="#2a2826" stroke-width="1"/>
  <text x="18" y="270" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#d4ccc0">T</text>
  <text x="36" y="268" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#c8c0b4">Tracking In</text>
  <text x="36" y="279" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478">Tracking · 0.6s</text>

  <!-- Apply button row -->
  <rect x="0" y="280" width="480" height="40" fill="#141414"/>
  <line x1="0" y1="280" x2="480" y2="280" stroke="#2a2826" stroke-width="1"/>
  <rect x="12" y="290" width="88" height="22" fill="#d4ccc0"/>
  <text x="56" y="305" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0c0c0c" text-anchor="middle">Apply Preset</text>
  <rect x="108" y="290" width="64" height="22" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="140" y="305" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8a8478" text-anchor="middle">Preview</text>

</svg>
