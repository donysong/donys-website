<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="geHeader" x1="0" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="curveGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" rx="12" fill="#1e1e1e"/>
  <rect width="480" height="320" rx="12" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Header -->
  <rect width="480" height="36" rx="12" fill="#252525"/>
  <rect y="24" width="480" height="12" fill="#252525"/>
  <rect width="480" height="2" fill="url(#geHeader)"/>
  <text x="16" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e0e0e0">Dony's Graph Editor</text>

  <!-- ===== LEFT: Graph Canvas ===== -->
  <rect x="16" y="48" width="240" height="220" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Grid -->
  <line x1="16" y1="103" x2="256" y2="103" stroke="#252525" stroke-width="0.5"/>
  <line x1="16" y1="158" x2="256" y2="158" stroke="#252525" stroke-width="0.5"/>
  <line x1="16" y1="213" x2="256" y2="213" stroke="#252525" stroke-width="0.5"/>
  <line x1="76" y1="48" x2="76" y2="268" stroke="#252525" stroke-width="0.5"/>
  <line x1="136" y1="48" x2="136" y2="268" stroke="#252525" stroke-width="0.5"/>
  <line x1="196" y1="48" x2="196" y2="268" stroke="#252525" stroke-width="0.5"/>

  <!-- Diagonal reference -->
  <line x1="16" y1="268" x2="256" y2="48" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ghost curve -->
  <path d="M 16 268 C 112 268, 160 48, 256 48" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.15"/>

  <!-- Main Bezier curve (Ease Out - dramatic) -->
  <path d="M 16 268 C 16 100, 160 48, 256 48" stroke="#10b981" stroke-width="3" fill="none" filter="url(#curveGlow)"/>

  <!-- Fill area under curve -->
  <path d="M 16 268 C 16 100, 160 48, 256 48 L 256 268 Z" fill="#10b981" opacity="0.04"/>

  <!-- Control handles -->
  <line x1="16" y1="268" x2="16" y2="100" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="256" y1="48" x2="160" y2="48" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Control points -->
  <circle cx="16" cy="100" r="6" fill="#10b981" stroke="#fff" stroke-width="2"/>
  <circle cx="160" cy="48" r="6" fill="#10b981" stroke="#fff" stroke-width="2"/>

  <!-- Start/End points -->
  <circle cx="16" cy="268" r="3" fill="#666"/>
  <circle cx="256" cy="48" r="3" fill="#666"/>

  <!-- Axis labels -->
  <text x="16" y="284" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666">0</text>
  <text x="252" y="284" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="end">1</text>
  <text x="10" y="56" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#666" text-anchor="end">1</text>
  <text x="136" y="284" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#444" text-anchor="middle">time →</text>

  <!-- Value display -->
  <rect x="16" y="290" width="240" height="22" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <text x="26" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#10b981">cubic-bezier(0.00, 0.76, 0.60, 1.00)</text>

  <!-- ===== RIGHT: Presets ===== -->
  <text x="276" y="62" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e0e0e0">Presets</text>

  <!-- Search -->
  <rect x="276" y="70" width="188" height="22" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <text x="288" y="85" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#555">Search...</text>

  <!-- Category label -->
  <text x="276" y="110" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#666" letter-spacing="1">STANDARD</text>

  <!-- Preset items with mini curve previews -->
  <g>
    <rect x="276" y="116" width="188" height="26" rx="4" fill="#2a2a2a"/>
    <!-- Mini curve -->
    <rect x="282" y="120" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <line x1="284" y1="136" x2="298" y2="122" stroke="#666" stroke-width="1"/>
    <text x="306" y="133" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ccc">Linear</text>
  </g>

  <g>
    <rect x="276" y="146" width="188" height="26" rx="4" fill="#2a2a2a"/>
    <rect x="282" y="150" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <path d="M 284 166 C 290 166, 294 152, 298 152" stroke="#666" stroke-width="1" fill="none"/>
    <text x="306" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ccc">Ease In</text>
  </g>

  <!-- Selected preset -->
  <g>
    <rect x="276" y="176" width="188" height="26" rx="4" fill="#333" stroke="#10b981" stroke-width="0.8"/>
    <rect x="282" y="180" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <path d="M 284 196 C 284 184, 292 182, 298 182" stroke="#10b981" stroke-width="1.2" fill="none"/>
    <text x="306" y="193" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#10b981">Ease Out</text>
    <text x="458" y="193" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#10b981" text-anchor="end">✓</text>
  </g>

  <g>
    <rect x="276" y="206" width="188" height="26" rx="4" fill="#2a2a2a"/>
    <rect x="282" y="210" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <path d="M 284 226 C 290 226, 292 212, 298 212" stroke="#666" stroke-width="1" fill="none"/>
    <text x="306" y="223" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ccc">Ease In-Out</text>
  </g>

  <!-- Category: Motion -->
  <text x="276" y="250" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#666" letter-spacing="1">MOTION</text>

  <g>
    <rect x="276" y="256" width="188" height="26" rx="4" fill="#2a2a2a"/>
    <rect x="282" y="260" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <path d="M 284 276 C 284 262, 290 276, 298 262" stroke="#666" stroke-width="1" fill="none"/>
    <text x="306" y="273" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ccc">Overshoot</text>
  </g>

  <g>
    <rect x="276" y="286" width="188" height="26" rx="4" fill="#2a2a2a"/>
    <rect x="282" y="290" width="18" height="18" rx="2" fill="#1a1a1a"/>
    <path d="M 284 306 C 284 292, 296 306, 298 292" stroke="#666" stroke-width="1" fill="none"/>
    <text x="306" y="303" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ccc">Bounce End</text>
  </g>
</svg>