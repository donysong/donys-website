<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">

  <!-- Background -->
  <rect width="480" height="320" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>

  <!-- Cream top stripe -->
  <line x1="0" y1="0" x2="480" y2="0" stroke="#d4ccc0" stroke-width="1" opacity="0.3"/>

  <!-- Header (height=32) -->
  <rect x="0" y="0" width="480" height="32" fill="#141414"/>
  <rect x="14" y="11" width="8" height="8" fill="none" stroke="#d4ccc0" stroke-width="1" transform="rotate(45 18 15)"/>
  <text x="17" y="19" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#d4ccc0" text-anchor="middle">D</text>
  <text x="30" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e8e0d4" letter-spacing="2">GRAPH EDITOR</text>

  <!-- ─── Left side: Graph canvas (x:0-260) ─── -->
  <!-- Canvas bg -->
  <rect x="12" y="44" width="236" height="186" fill="#111111" stroke="#2a2826" stroke-width="1"/>

  <!-- Grid lines horizontal -->
  <line x1="12" y1="90" x2="248" y2="90" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="12" y1="137" x2="248" y2="137" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="12" y1="184" x2="248" y2="184" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- Grid lines vertical -->
  <line x1="71" y1="44" x2="71" y2="230" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="130" y1="44" x2="130" y2="230" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="189" y1="44" x2="189" y2="230" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- Diagonal reference line -->
  <line x1="12" y1="230" x2="248" y2="44" stroke="#3a3836" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Ghost curve (previous, faint) -->
  <path d="M12,230 C60,180 200,100 248,44" stroke="#d4ccc0" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Handle dashed lines -->
  <line x1="12" y1="230" x2="62" y2="160" stroke="#3a3836" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="248" y1="44" x2="198" y2="100" stroke="#3a3836" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Main Ease Out bezier curve -->
  <path d="M12,230 C62,160 198,100 248,44" stroke="#d4ccc0" stroke-width="2.5" fill="none"/>

  <!-- Handle circles -->
  <circle cx="62" cy="160" r="6" fill="#d4ccc0" stroke="white" stroke-width="1.5"/>
  <circle cx="198" cy="100" r="6" fill="#d4ccc0" stroke="white" stroke-width="1.5"/>

  <!-- Endpoint circles -->
  <circle cx="12" cy="230" r="3" fill="#8a8478"/>
  <circle cx="248" cy="44" r="3" fill="#8a8478"/>

  <!-- Axis labels -->
  <text x="14" y="242" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640">0</text>
  <text x="240" y="55" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640">1</text>

  <!-- Value display box below canvas -->
  <rect x="12" y="232" width="236" height="20" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="130" y="245" font-family="Consolas, 'SF Mono', monospace" font-size="7.5" fill="#d4ccc0" text-anchor="middle">cubic-bezier(0.00, 0.76, 0.60, 1.00)</text>

  <!-- ─── Right side: Preset list (x:264-480) ─── -->
  <!-- PRESETS label -->
  <text x="270" y="54" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a4640" letter-spacing="1.5">PRESETS</text>

  <!-- Search box -->
  <rect x="264" y="60" width="204" height="20" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <text x="278" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#4a4640">Search...</text>

  <!-- STANDARD label -->
  <text x="270" y="98" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a4640" letter-spacing="1.5">STANDARD</text>

  <!-- Linear -->
  <rect x="264" y="104" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="111" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <line x1="271" y1="122" x2="287" y2="112" stroke="#8a8478" stroke-width="1"/>
  <text x="296" y="121" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Linear</text>

  <!-- Ease In -->
  <rect x="264" y="130" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="137" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,148 C278,148 287,139 288,137" stroke="#8a8478" stroke-width="1" fill="none"/>
  <text x="296" y="147" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Ease In</text>

  <!-- Ease Out (selected) -->
  <rect x="264" y="156" width="204" height="26" fill="#242424" stroke="#2a2826" stroke-width="1"/>
  <line x1="264" y1="156" x2="264" y2="182" stroke="#d4ccc0" stroke-width="2"/>
  <rect x="270" y="163" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,174 C272,174 282,165 288,163" stroke="#d4ccc0" stroke-width="1" fill="none"/>
  <text x="296" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#e8e0d4">Ease Out</text>

  <!-- Ease In-Out -->
  <rect x="264" y="182" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="189" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,200 C274,200 278,192 280,190 C282,188 285,189 288,189" stroke="#8a8478" stroke-width="1" fill="none"/>
  <text x="296" y="199" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Ease In-Out</text>

  <!-- MOTION label -->
  <text x="270" y="222" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a4640" letter-spacing="1.5">MOTION</text>

  <!-- Overshoot -->
  <rect x="264" y="228" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="235" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,246 C276,246 282,234 284,237 C286,240 288,238 288,237" stroke="#8a8478" stroke-width="1" fill="none"/>
  <text x="296" y="245" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Overshoot</text>

  <!-- Bounce End -->
  <rect x="264" y="254" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="261" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,272 C276,272 279,264 281,268 C283,272 284,270 285,272 C286,274 287,273 288,272" stroke="#8a8478" stroke-width="1" fill="none"/>
  <text x="296" y="271" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Bounce End</text>

  <!-- Spring -->
  <rect x="264" y="280" width="204" height="26" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="270" y="287" width="18" height="12" fill="#0c0c0c" stroke="#2a2826" stroke-width="1"/>
  <path d="M271,298 C276,298 280,288 282,291 C284,294 286,291 288,292" stroke="#8a8478" stroke-width="1" fill="none"/>
  <text x="296" y="297" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">Spring</text>

</svg>
