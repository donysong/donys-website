<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">

  <!-- Background -->
  <rect width="480" height="320" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>

  <!-- Cream top stripe -->
  <line x1="0" y1="0" x2="480" y2="0" stroke="#d4ccc0" stroke-width="1" opacity="0.3"/>

  <!-- Header (height=32) -->
  <rect x="0" y="0" width="480" height="32" fill="#141414"/>
  <rect x="14" y="11" width="8" height="8" fill="none" stroke="#d4ccc0" stroke-width="1" transform="rotate(45 18 15)"/>
  <text x="17" y="19" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#d4ccc0" text-anchor="middle">D</text>
  <text x="30" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e8e0d4" letter-spacing="2">EXPRESSION EDITOR</text>
  <text x="222" y="20" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640"> — 70+ EXPRESSIONS</text>

  <!-- ─── Category tabs (height=24) ─── -->
  <rect x="0" y="32" width="480" height="24" fill="#141414"/>
  <line x1="0" y1="56" x2="480" y2="56" stroke="#2a2826" stroke-width="1"/>

  <text x="26" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Timer</text>
  <text x="70" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Random</text>
  <text x="112" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Math</text>
  <!-- Motion active -->
  <text x="155" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e8e0d4" text-anchor="middle">Motion</text>
  <line x1="136" y1="56" x2="174" y2="56" stroke="#d4ccc0" stroke-width="2"/>
  <text x="195" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Layer</text>
  <text x="232" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Text</text>
  <text x="267" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Color</text>
  <text x="305" y="48" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Camera</text>

  <!-- ─── Expression list rows (each 23px, border-bottom) ─── -->

  <!-- Row 1: wiggle() -->
  <rect x="0" y="56" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="79" x2="480" y2="79" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="71" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">wiggle()</text>
  <text x="110" y="71" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="71" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">&#47;&#47; &#47;&#47; freq, amp</text>
  <rect x="414" y="61" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="71" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- Row 2: bounce() — selected -->
  <rect x="0" y="79" width="480" height="23" fill="#242424"/>
  <line x1="0" y1="102" x2="480" y2="102" stroke="#2a2826" stroke-width="1"/>
  <line x1="0" y1="79" x2="0" y2="102" stroke="#d4ccc0" stroke-width="2"/>
  <text x="12" y="94" font-family="Consolas, 'SF Mono', monospace" font-size="10" font-weight="600" fill="#e8e0d4">bounce()</text>
  <text x="110" y="94" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="94" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#d4ccc0">decay, freq</text>
  <rect x="414" y="84" width="36" height="14" fill="#1a1a1a" stroke="#d4ccc0" stroke-width="1"/>
  <text x="432" y="94" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#d4ccc0" text-anchor="middle">COPY</text>

  <!-- Row 3: elastic() -->
  <rect x="0" y="102" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="125" x2="480" y2="125" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="117" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">elastic()</text>
  <text x="110" y="117" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="117" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">decay, freq</text>
  <rect x="414" y="107" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="117" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- Row 4: loopOut() -->
  <rect x="0" y="125" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="148" x2="480" y2="148" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="140" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">loopOut()</text>
  <text x="110" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="140" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">repeat last keyframe</text>
  <rect x="414" y="130" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="140" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- Row 5: timeRemap() -->
  <rect x="0" y="148" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="171" x2="480" y2="171" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="163" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">timeRemap()</text>
  <text x="128" y="163" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="138" y="163" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">time remap control</text>
  <rect x="414" y="153" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="163" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- Row 6: smooth() -->
  <rect x="0" y="171" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="194" x2="480" y2="194" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="186" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">smooth()</text>
  <text x="110" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">width, samples</text>
  <rect x="414" y="176" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="186" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- Row 7: inertia() -->
  <rect x="0" y="194" width="480" height="23" fill="#1a1a1a"/>
  <line x1="0" y1="217" x2="480" y2="217" stroke="#2a2826" stroke-width="1"/>
  <text x="12" y="209" font-family="Consolas, 'SF Mono', monospace" font-size="10" fill="#c8c0b4">inertia()</text>
  <text x="110" y="209" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4a4640">&#183;</text>
  <text x="120" y="209" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478">overshoot inertia</text>
  <rect x="414" y="199" width="36" height="14" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="432" y="209" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#8a8478" text-anchor="middle">COPY</text>

  <!-- ─── Code preview panel (height=103, border-top) ─── -->
  <rect x="0" y="217" width="480" height="103" fill="#0c0c0c"/>
  <line x1="0" y1="217" x2="480" y2="217" stroke="#2a2826" stroke-width="1"/>

  <!-- Line numbers -->
  <text x="14" y="234" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">1</text>
  <text x="14" y="248" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">2</text>
  <text x="14" y="262" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">3</text>
  <text x="14" y="276" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">4</text>
  <text x="14" y="290" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">5</text>
  <text x="14" y="304" font-family="Consolas, 'SF Mono', monospace" font-size="8" fill="#4a4640" text-anchor="end">6</text>

  <!-- Separator line -->
  <line x1="20" y1="217" x2="20" y2="320" stroke="#2a2826" stroke-width="1"/>

  <!-- Code content -->
  <text x="28" y="234" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#8a8478">var</text>
  <text x="48" y="234" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">t = (time - key(1).time) / 0.4;</text>
  <text x="28" y="248" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#8a8478">var</text>
  <text x="48" y="248" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">amp = thisComp.layer("Control").effect("Amp")(1);</text>
  <text x="28" y="262" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#8a8478">if</text>
  <text x="42" y="262" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">(t &lt; 1) bounce = amp * Math.abs(Math.sin(</text>
  <text x="28" y="276" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">  Math.PI * t * 3) * Math.pow(1 - t, 2));</text>
  <text x="28" y="290" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#8a8478">else</text>
  <text x="52" y="290" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">bounce = 0;</text>
  <text x="28" y="304" font-family="Consolas, 'SF Mono', monospace" font-size="8.5" fill="#d4ccc0">value + [0, -bounce];</text>

</svg>
