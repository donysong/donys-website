<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">

  <defs>
    <!-- Gradient swatches — industrial palette -->
    <linearGradient id="g-sunset" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0685a"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </linearGradient>
    <linearGradient id="g-ocean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c5f7a"/>
      <stop offset="100%" stop-color="#4a9cb8"/>
    </linearGradient>
    <linearGradient id="g-midnight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#3a3a5e"/>
    </linearGradient>
    <linearGradient id="g-neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b3a7a"/>
      <stop offset="100%" stop-color="#c86a9a"/>
    </linearGradient>
    <linearGradient id="g-cotton" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a0b8"/>
      <stop offset="100%" stop-color="#b8c8e8"/>
    </linearGradient>
    <linearGradient id="g-synth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a2060"/>
      <stop offset="100%" stop-color="#8a3080"/>
    </linearGradient>
    <linearGradient id="g-aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a6a4a"/>
      <stop offset="100%" stop-color="#4ab890"/>
    </linearGradient>
    <linearGradient id="g-lava" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b2000"/>
      <stop offset="100%" stop-color="#e05020"/>
    </linearGradient>
    <linearGradient id="g-deepsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2840"/>
      <stop offset="100%" stop-color="#1a5880"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>

  <!-- Cream top stripe -->
  <line x1="0" y1="0" x2="480" y2="0" stroke="#d4ccc0" stroke-width="1" opacity="0.3"/>

  <!-- Header (height=32) -->
  <rect x="0" y="0" width="480" height="32" fill="#141414"/>
  <rect x="14" y="11" width="8" height="8" fill="none" stroke="#d4ccc0" stroke-width="1" transform="rotate(45 18 15)"/>
  <text x="17" y="19" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#d4ccc0" text-anchor="middle">D</text>
  <text x="30" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e8e0d4" letter-spacing="2">GRADIENT LIBRARY</text>

  <!-- Tab bar (height=24) -->
  <rect x="0" y="32" width="480" height="24" fill="#141414"/>
  <line x1="0" y1="56" x2="480" y2="56" stroke="#2a2826" stroke-width="1"/>
  <!-- GRADIENT active -->
  <text x="60" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e8e0d4" text-anchor="middle">GRADIENT</text>
  <line x1="20" y1="56" x2="100" y2="56" stroke="#d4ccc0" stroke-width="2"/>
  <text x="145" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8a8478" text-anchor="middle">TEXT</text>
  <text x="210" y="48" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8a8478" text-anchor="middle">ASSETS</text>

  <!-- Category pills (height=28) -->
  <rect x="0" y="56" width="480" height="28" fill="#1a1a1a"/>
  <line x1="0" y1="84" x2="480" y2="84" stroke="#2a2826" stroke-width="1"/>
  <!-- All (active) -->
  <rect x="12" y="62" width="22" height="16" fill="#1a1a1a" stroke="#d4ccc0" stroke-width="1"/>
  <text x="23" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d4ccc0" text-anchor="middle">All</text>
  <rect x="40" y="62" width="34" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="57" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Warm</text>
  <rect x="80" y="62" width="28" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="94" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Cool</text>
  <rect x="114" y="62" width="32" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="130" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Pastel</text>
  <rect x="152" y="62" width="28" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="166" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Dark</text>
  <rect x="186" y="62" width="42" height="16" fill="#141414" stroke="#2a2826" stroke-width="1"/>
  <text x="207" y="73" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Vibrant</text>

  <!-- ─── 3-column swatch grid ─── -->
  <!-- Row 1 -->
  <!-- Card 1: Sunset -->
  <rect x="12" y="92" width="138" height="76" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="12" y="92" width="138" height="58" fill="url(#g-sunset)"/>
  <text x="81" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Sunset</text>

  <!-- Card 2: Ocean (hover state) -->
  <rect x="162" y="92" width="138" height="76" fill="#1a1a1a" stroke="#3a3836" stroke-width="1.5"/>
  <rect x="162" y="92" width="138" height="58" fill="url(#g-ocean)"/>
  <text x="231" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#c8c0b4" text-anchor="middle">Ocean</text>

  <!-- Card 3: Midnight -->
  <rect x="312" y="92" width="138" height="76" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="312" y="92" width="138" height="58" fill="url(#g-midnight)"/>
  <text x="381" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Midnight</text>

  <!-- Row 2 -->
  <!-- Card 4: Neon Pink -->
  <rect x="12" y="176" width="138" height="76" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="12" y="176" width="138" height="58" fill="url(#g-neon)"/>
  <text x="81" y="246" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Neon Pink</text>

  <!-- Card 5: Cotton Candy -->
  <rect x="162" y="176" width="138" height="76" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="162" y="176" width="138" height="58" fill="url(#g-cotton)"/>
  <text x="231" y="246" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Cotton Candy</text>

  <!-- Card 6: Synthwave -->
  <rect x="312" y="176" width="138" height="76" fill="#1a1a1a" stroke="#2a2826" stroke-width="1"/>
  <rect x="312" y="176" width="138" height="58" fill="url(#g-synth)"/>
  <text x="381" y="246" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8a8478" text-anchor="middle">Synthwave</text>

  <!-- ─── Apply row (bottom) ─── -->
  <rect x="0" y="260" width="480" height="60" fill="#141414"/>
  <line x1="0" y1="260" x2="480" y2="260" stroke="#2a2826" stroke-width="1"/>
  <!-- Mini previews of Aurora, Lava, Deep Sea as small chips -->
  <rect x="12" y="274" width="50" height="16" fill="url(#g-aurora)" stroke="#2a2826" stroke-width="1"/>
  <text x="37" y="302" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Aurora</text>
  <rect x="70" y="274" width="50" height="16" fill="url(#g-lava)" stroke="#2a2826" stroke-width="1"/>
  <text x="95" y="302" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Lava</text>
  <rect x="128" y="274" width="50" height="16" fill="url(#g-deepsea)" stroke="#2a2826" stroke-width="1"/>
  <text x="153" y="302" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#8a8478" text-anchor="middle">Deep Sea</text>
  <!-- Apply button -->
  <rect x="380" y="270" width="80" height="22" fill="#d4ccc0"/>
  <text x="420" y="285" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0c0c0c" text-anchor="middle">Apply</text>

</svg>
